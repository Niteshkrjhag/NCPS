<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NCPS — Credibility-Driven Information</title>
  <meta name="description" content="NCPS — Trust-aware information platform. Content ranked by credibility, not engagement.">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <header class="app-header">
    <div class="app-logo">
      <div class="icon">&#9733;</div>
      NCPS
    </div>
    <nav class="nav-links">
      <a href="/" class="active">Feed</a>
      <a href="/report.html">Report</a>
      <a href="/map.html">Map</a>
      <a href="/profile.html">Profile</a>
    </nav>
    <div class="location-indicator off" id="location-indicator">
      <span class="dot"></span> Location off
    </div>
  </header>

  <div class="main-container">
    <!-- Feed header -->
    <div class="flex justify-between items-center mb-16">
      <div>
        <h1 style="font-size:20px;font-weight:700">Your Feed</h1>
        <p class="text-muted" style="font-size:12px;margin-top:2px">
          Ranked by credibility &times; proximity &times; urgency
        </p>
      </div>
      <button class="btn btn-secondary" onclick="loadFeed()" id="refresh-btn"
              style="font-size:12px;padding:6px 14px">
        ↻ Refresh
      </button>
    </div>

    <!-- Feed posts -->
    <div id="feed-container">
      <div class="loading">
        <div class="spinner"></div>
        <span>Loading feed...</span>
      </div>
    </div>
  </div>

  <script src="/static/js/app.js"></script>
  <script src="/static/js/feed.js"></script>
  <script>
    // Called after onboarding or immediately if already onboarded
    function onAppReady() {
      loadFeed();
      startAutoRefresh(30000);
    }
  </script>
</body>
</html>
